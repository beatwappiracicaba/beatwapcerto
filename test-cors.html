<!DOCTYPE html>
<html>
<head>
    <title>Teste CORS</title>
</head>
<body>
    <h1>Teste CORS - API BeatWapp</h1>
    <div id="resultado"></div>
    
    <script src="test-api.js"></script>
    <script>
        // Monitorar os resultados do test-api.js
        const originalLog = console.log;
        const originalError = console.error;
        const resultado = document.getElementById('resultado');
        let logs = [];
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            logs.push(args.join(' '));
            atualizarResultado();
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            logs.push('❌ ' + args.join(' '));
            atualizarResultado();
        };
        
        function atualizarResultado() {
            resultado.innerHTML = `
                <h2>🧪 Testes de API em execução...</h2>
                <div style="background: #f0f0f0; padding: 10px; margin: 10px 0; font-family: monospace; white-space: pre-wrap;">
${logs.join('\n')}
                </div>
                <p>Aguarde... os testes estão sendo executados automaticamente.</p>
            `;
        }
        
        // Executar após 3 segundos para garantir que tudo carregou
        setTimeout(() => {
            logs.push('🚀 Iniciando testes automáticos...');
            atualizarResultado();
        }, 1000);
    </script>
</body>
</html>
