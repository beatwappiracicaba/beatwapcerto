<!DOCTYPE html>
<html lang="en">

        const debugDiv = document.getElementById('debug-content');
        
        function log(message) {
            console.log(message);
            debugDiv.innerHTML += message + '<br>';
        }
        
        log('Iniciando carregamento...');
        
        // Monitorar erros
        window.addEventListener('error', (event) => {
            log(`❌ Erro: ${event.message}`);
            log(`Arquivo: ${event.filename}:${event.lineno}`);
        });
        
        // Monitorar avisos
        window.addEventListener('unhandledrejection', (event) => {
            log(`⚠️ Rejeição não tratada: ${event.reason}`);
        });
        
        // Verificar se o CSS carregou
        const checkCSS = setInterval(() => {
            const styles = document.querySelector('link[href="/assets/index-C5sZCW6_.css"]');
            if (styles) {
                log('✅ CSS carregado');
                clearInterval(checkCSS);
            }
        }, 100);
        
        // Carregar o JavaScript principal
        log('Carregando index-j3w_R8XB.js...');
        
        import('/assets/index-j3w_R8XB.js').then(module => {

            log(`Módulo: ${JSON.stringify(Object.keys(module))}`);
            
            // Verificar se Js.createRoot existe
            if (window.Js && window.Js.createRoot) {
                log('✅ Js.createRoot encontrado');
                
                // Tentar inicializar React
                setTimeout(() => {
                    const container = document.getElementById('root');
                    if (container) {
                        log('✅ Elemento root encontrado');
                        
                        try {
                            const root = window.Js.createRoot(container);
                            log('✅ Root React criado');
                            
                            // Criar um componente simples para teste
                            const TestComponent = function() {
                                return window.e?.jsx ? 
                                    window.e.jsx('div', { 
                                        style: { 
                                            padding: '20px', 
                                            background: 'linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%)',
                                            color: 'white',
                                            minHeight: '100vh',
                                            display: 'flex',
                                            flexDirection: 'column',
                                            alignItems: 'center',
                                            justifyContent: 'center'
                                        },
                                        children: [
                                            window.e.jsx('h1', { 
                                                style: { color: '#f0c14b', fontSize: '2rem', marginBottom: '20px' },
                                                children: 'BeatWap Produções' 
                                            }),
                                            window.e.jsx('p', { 
                                                style: { fontSize: '1.2rem', marginBottom: '10px' },
                                                children: 'Design carregado com sucesso!' 
                                            }),
                                            window.e.jsx('p', { 
                                                style: { fontSize: '0.9rem', color: '#888' },
                                                children: 'React está funcionando corretamente.' 
                                            })
                                        ]
                                    }) : 
                                    '<div style="padding: 20px; background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;"><h1 style="color: #f0c14b;">BeatWap Produções</h1><p>Design carregado com sucesso!</p><p style="color: #888;">React está funcionando corretamente.</p></div>';
                            };
                            
                            root.render(
                                window.e.jsx(window.S?.StrictMode || 'div', { 
                                    children: window.e.jsx(TestComponent, {}) 
                                })
                            );
                            
                            log('✅ Componente React renderizado');
                            
                        } catch (error) {
                            log(`❌ Erro ao renderizar React: ${error.message}`);
                        }
                    } else {
                        log('❌ Elemento root não encontrado');
                    }
                }, 2000);
                
            } else {
                log('❌ Js.createRoot não encontrado');
                log('Objetos disponíveis: ' + Object.keys(window).filter(k => k.length < 10).join(', '));
            }
            
        }).catch(error => {
            log(`❌ Erro ao carregar index-j3w_R8XB.js: ${error.message}`);
        });
        
        // Verificar outros módulos
        setTimeout(() => {
            log('Verificando outros módulos...');
            import('/assets/vendor-BIzT66jz.js').then(() => {
                log('✅ vendor-BIzT66jz.js carregado');
            }).catch(err => log(`❌ Erro vendor: ${err.message}`));
            
            import('/assets/ui-I6eHks9W.js').then(() => {
                log('✅ ui-I6eHks9W.js carregado');
            }).catch(err => log(`❌ Erro ui: ${err.message}`));
        }, 1000);
    </script>
</body>
</html>
